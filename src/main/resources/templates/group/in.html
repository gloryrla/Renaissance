<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>그룹 참여</title>
</head>
<body>

<nav>
    <span>project1</span>
    <div>
        <a th:href="@{/mypage}">마이페이지</a>
        <a th:href="@{/group/new}">그룹 생성</a>
        <a th:href="@{/group/list}">그룹 목록</a>
        <a th:href="@{/group/in}">그룹 참여</a>
        <a th:href="@{/restaurant/list}">음식점 검색</a>
    </div>
    <div>
        <span th:text="${loginMember.name} + '님'"></span>
        <a th:href="@{/logout}">로그아웃</a>
    </div>
</nav>

<form th:action="@{/group/in}" method="post">
    <div>
        <label for="inviteCode">초대 코드</label>
        <input type="text" id="inviteCode" name="inviteCode" placeholder="초대 코드를 입력하세요" required />
    </div>
    <div th:if="${errorMessage}">
        <span th:text="${errorMessage}"></span>
    </div>
    <button type="submit">그룹 참여</button>
</form>

</body>
</html>
